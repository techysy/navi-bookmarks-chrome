<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="appName">个人书签导航</title>
    <link rel="stylesheet" href="newtab.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 data-i18n="headerTitle">📚 书签导航</h1>
            <p data-i18n="headerSubtitle">快速访问您喜爱的网站</p>
        </header>

        <div class="search-bar">
            <form id="searchForm" class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="搜索书签或使用搜索引擎...">
                <div class="search-engine-selector" id="searchEngineSelector">
                    <span class="search-engine-icon" id="currentEngineIcon">🔍</span>
                    <span class="search-engine-name" id="currentEngineName"></span>
                </div>
                <div class="search-dropdown" id="searchEngineDropdown">
                    <div class="search-dropdown-item selected" data-engine="bookmarks">
                        <span class="engine-icon">⭐</span>
                        <div class="engine-info">
                            <div class="name" data-i18n="bookmarkSearch">书签搜索</div>
                            <div class="url" data-i18n="bookmarkSearchDesc">搜索您的书签</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="google">
                        <span class="engine-icon">🔍</span>
                        <div class="engine-info">
                            <div class="name">Google</div>
                            <div class="url">google.com</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="baidu">
                        <span class="engine-icon">🅱️</span>
                        <div class="engine-info">
                            <div class="name" data-i18n="baidu">百度</div>
                            <div class="url">baidu.com</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="bing">
                        <span class="engine-icon">🔷</span>
                        <div class="engine-info">
                            <div class="name" data-i18n="bing">必应</div>
                            <div class="url">bing.com</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="duckduckgo">
                        <span class="engine-icon">🦆</span>
                        <div class="engine-info">
                            <div class="name">DuckDuckGo</div>
                            <div class="url">duckduckgo.com</div>
                        </div>
                    </div>
                </div>
                <div class="search-results" id="searchResults"></div>
            </form>
            <button class="add-btn" id="addBookmarkBtn" data-i18n="addBookmark">+ 添加书签</button>
            <button class="add-btn" id="editCategoryBtn" data-i18n="editCategory">📁 编辑分类</button>
        </div>

        <div class="category-filter" id="categoryFilter">
        </div>

        <div id="bookmarkContent">
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h2 id="modalTitle" data-i18n="modalAddBookmark">添加书签</h2>
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label data-i18n="labelSelectIcon">选择图标</label>
                    <div class="icon-picker">
                        <input type="hidden" id="iconTypeInput" value="emoji">
                        <input type="hidden" id="iconValueInput" value="">
                        <div class="icon-picker-current">
                            <div class="icon-preview" id="iconPreview">
                                <span id="iconPreviewText">🌟</span>
                                <img id="iconPreviewImg" style="display:none;" alt="">
                            </div>
                            <span class="icon-preview-label" data-i18n="iconPreviewLabel">当前图标</span>
                        </div>
                        <div class="icon-picker-actions">
                            <button type="button" class="icon-action-btn" id="fetchFaviconBtn" data-i18n="btnFetchFavicon">🌐 获取网站图标</button>
                            <button type="button" class="icon-action-btn" id="iconResetBtn" data-i18n="btnResetIcon">🔄 重置为默认</button>
                        </div>
                        <div class="icon-emoji-picker" id="emojiPicker" style="display:none;">
                            <div class="emoji-grid" id="emojiGrid"></div>
                        </div>
                        <div class="icon-favicon-list" id="faviconList" style="display:none;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="urlInput" data-i18n="labelWebsiteUrl">网站地址</label>
                    <input type="text" id="urlInput" data-i18n-placeholder="placeholderWebsiteUrl" placeholder="输入网站URL或IP地址（可省略http://）">
                    <div class="field-hint" data-i18n="hintUrlEnter">💡 输入网址后回车，自动获取相关信息</div>
                </div>
                <div class="form-group">
                    <label for="nameInput" data-i18n="labelWebsiteName">网站名称</label>
                    <input type="text" id="nameInput" data-i18n-placeholder="placeholderWebsiteName" placeholder="输入网站名称">
                </div>
                <div class="form-group" style="display:none;">
                    <input type="text" id="descriptionInput">
                </div>
                <div class="form-group">
                    <label for="categoryInput" data-i18n="labelCategory">分类</label>
                    <select id="categoryInput">
                    </select>
                </div>
                <div class="form-group" id="newCategoryGroup" style="display: none;">
                    <label for="newCategoryInput" data-i18n="labelNewCategory">新分类名称</label>
                    <input type="text" id="newCategoryInput" data-i18n-placeholder="placeholderNewCategory" placeholder="输入新分类名称">
                </div>
                <div class="btn-group">
                    <button class="cancel-btn" id="cancelModalBtn" data-i18n="btnCancel">取消</button>
                    <button class="save-btn" id="saveModalBtn" data-i18n="btnSave">保存</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="categoryModalOverlay">
            <div class="modal">
                <h2 data-i18n="modalEditCategory">📁 编辑分类</h2>
                <div class="form-group">
                    <label for="newCatName" data-i18n="addNewCategory">添加新分类</label>
                    <input type="text" id="newCatName" data-i18n-placeholder="placeholderEnterCategoryName" placeholder="输入新分类名称">
                </div>
                <button class="add-category-btn" id="addCategoryBtn">
                    <span class="add-icon">+</span>
                    <span data-i18n="btnAddCategory">添加分类</span>
                </button>
                <div style="margin-bottom: 15px; font-size: 0.8rem; color: #999;" data-i18n="hintDragCategory">
                    💡 拖动分类可以调整顺序
                </div>
                <div id="categoryList" class="category-list">
                </div>
                <div class="btn-group">
                    <button class="cancel-btn" id="closeCategoryModalBtn" data-i18n="btnClose">关闭</button>
                </div>
            </div>
        </div>

        <div class="fab-panel" id="fabPanel">
            <div class="fab-menu" id="fabMenu">
                <div class="fab-menu-header">
                    <span data-i18n="settingsTitle">设置</span>
                </div>
                <button class="fab-menu-item" id="exportBtn">
                    <span class="fab-menu-icon">📤</span>
                    <span data-i18n="exportBookmarks">导出书签</span>
                </button>
                <button class="fab-menu-item" id="importBtn">
                    <span class="fab-menu-icon">📥</span>
                    <span data-i18n="importBookmarks">导入书签</span>
                </button>
                <button class="fab-menu-item" id="changeBgBtn">
                    <span class="fab-menu-icon">🎨</span>
                    <span data-i18n="changeBackground">更换背景</span>
                </button>
                <div class="fab-menu-divider"></div>
                <div class="fab-menu-item fab-lang-row">
                    <span class="fab-menu-icon">🌐</span>
                    <span data-i18n="language">语言</span>
                    <select id="langSelect" class="lang-select">
                        <option value="system" data-i18n="langSystem">跟随系统</option>
                        <option value="zh_CN" data-i18n="langZhCN">🇨🇳 中文</option>
                        <option value="zh_TW" data-i18n="langZhTW">🇹🇼 繁體中文</option>
                        <option value="en" data-i18n="langEn">🇺🇸 English</option>
                        <option value="ja" data-i18n="langJa">🇯🇵 日本語</option>
                        <option value="ko" data-i18n="langKo">🇰🇷 한국어</option>
                        <option value="de" data-i18n="langDe">🇩🇪 Deutsch</option>
                        <option value="fr" data-i18n="langFr">🇫🇷 Français</option>
                        <option value="vi" data-i18n="langVi">🇻🇳 Tiếng Việt</option>
                        <option value="th" data-i18n="langTh">🇹🇭 ภาษาไทย</option>
                        <option value="ms" data-i18n="langMs">🇲🇾 Bahasa Melayu</option>
                    </select>
                </div>
            </div>
            <button class="fab-btn" id="ieToggleBtn">⚙️</button>
        </div>

        <input type="file" id="importFile" style="display: none;" accept=".json">

    </div>

    <script src="newtab.js"></script>
</body>
</html>
