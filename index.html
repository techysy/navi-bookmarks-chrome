<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人书签导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.5s ease;
        }

        body.loaded {
            background: url('/bg.JPG') center/cover fixed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        .add-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.2);
            border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 50px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .add-btn:hover {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .category-tag {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-tag:hover {
            background: rgba(255,255,255,0.3);
        }

        .category-tag.active {
            background: white;
            color: #667eea;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 500px;
            min-width: 280px;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 40px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .search-engine-selector {
            position: absolute;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .search-engine-selector:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .search-engine-icon {
            font-size: 0.85rem;
        }

        .search-engine-name {
            font-size: 0.75rem;
            color: white;
        }

        .search-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .search-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .search-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s ease;
            color: #333;
        }

        .search-dropdown-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .search-dropdown-item.selected {
            background: rgba(102, 126, 234, 0.15);
        }

        .search-dropdown-item .engine-icon {
            font-size: 1.2rem;
        }

        .search-dropdown-item .engine-info {
            flex: 1;
        }

        .search-dropdown-item .engine-info .name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .search-dropdown-item .engine-info .url {
            font-size: 0.7rem;
            color: #888;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 99;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s ease;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .search-result-item .icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
        }

        .search-result-item .info {
            flex: 1;
            min-width: 0;
        }

        .search-result-item .info .name {
            font-weight: 500;
            font-size: 0.9rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-result-item .info .url {
            font-size: 0.75rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-result-item .category {
            padding: 3px 8px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 0.65rem;
            color: #666;
        }

        .search-no-results {
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 0.9rem;
        }

        .search-suggestions {
            padding: 10px 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .search-suggestions .suggestion-title {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 8px;
        }

        .search-suggestions .suggestion-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .search-suggestions .suggestion-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .search-suggestions .suggestion-item .search-icon {
            position: static;
            font-size: 0.85rem;
            color: #667eea;
        }

        .search-suggestions .suggestion-item .text {
            font-size: 0.85rem;
            color: #666;
        }

        .bookmark-section {
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .section-header h2 {
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .section-header .count {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 10px;
            color: white;
            font-size: 0.8rem;
        }

        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .bookmark-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            cursor: grab;
        }

        .bookmark-card:active {
            cursor: grabbing;
        }

        .bookmark-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            background: rgba(255, 255, 255, 0.35);
        }

        .bookmark-card.dragging {
            opacity: 0.5;
            transform: scale(1.05);
        }

        .bookmark-card.drag-over {
            border: 2px dashed #667eea;
            background: rgba(255, 255, 255, 0.4);
        }

        .bookmark-card.add-card {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .bookmark-card.add-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            background: rgba(255, 255, 255, 0.35);
        }

        .bookmark-card.add-card .add-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 24px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .bookmark-card.add-card h3 {
            color: rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
            font-size: 14px;
        }

        .bookmark-card.add-card p {
            color: rgba(0, 0, 0, 0.5);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .bookmark-card .icon {
            width: 45px;
            height: 45px;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .bookmark-card .icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .bookmark-card h3 {
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bookmark-card p {
            font-size: 0.65rem;
            color: #888;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .bookmark-card p.description {
            font-size: 0.6rem;
            color: #666;
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
            opacity: 0;
            max-height: 0;
            transition: all 0.3s ease;
            margin-top: 0;
        }

        .bookmark-card:hover p.description {
            opacity: 1;
            max-height: 40px;
            margin-top: 5px;
        }

        .bookmark-card .category-badge {
            display: inline-block;
            padding: 2px 6px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 0.6rem;
            color: #666;
            margin-bottom: 6px;
        }

        .bookmark-card .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bookmark-card:hover .actions {
            opacity: 1;
        }

        .bookmark-card .actions button {
            padding: 4px 7px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.6rem;
            transition: background 0.2s ease;
        }

        .bookmark-card .actions .edit-btn {
            background: #667eea;
            color: white;
        }

        .bookmark-card .actions .edit-btn:hover {
            background: #5a6fd6;
        }

        .bookmark-card .actions .delete-btn {
            background: #ff6b6b;
            color: white;
        }

        .bookmark-card .actions .delete-btn:hover {
            background: #ee5a5a;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal .form-group {
            margin-bottom: 15px;
        }

        .modal .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9rem;
        }

        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .modal .form-group textarea {
            min-height: 80px;
            resize: vertical;
            line-height: 1.5;
        }

        .modal .form-group input:focus,
        .modal .form-group select:focus,
        .modal .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .modal .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .modal .btn-group .cancel-btn {
            background: #eee;
            color: #666;
        }

        .modal .btn-group .cancel-btn:hover {
            background: #ddd;
        }

        .modal .btn-group .save-btn {
            background: #667eea;
            color: white;
        }

        .modal .btn-group .save-btn:hover {
            background: #5a6fd6;
        }

        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 40px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .bookmark-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .bookmark-card {
                padding: 15px;
            }

            .bookmark-card .icon {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .actions-bar {
                flex-direction: row;
                gap: 10px;
            }

            .add-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
                min-width: auto;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .bookmark-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }
        }

        .add-category-btn {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .add-category-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .add-category-btn:active {
            transform: translateY(0);
        }

        .add-icon {
            font-size: 1.2rem;
            font-weight: 300;
        }

        .category-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .category-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .category-item:active {
            cursor: grabbing;
        }

        .category-item.dragging {
            opacity: 0.5;
            transform: scale(1.02);
            background: #dee2e6;
        }

        .category-item.drag-over {
            border-color: #667eea;
            background: #eef2ff;
        }

        .category-name {
            font-weight: 500;
            color: #333;
        }

        .category-count {
            margin-left: 10px;
            color: #999;
            font-size: 0.8rem;
        }

        .category-actions {
            display: flex;
            gap: 8px;
        }

        .category-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-btn.rename {
            background: #667eea;
            color: white;
        }

        .category-btn.rename:hover {
            background: #5a6fd6;
        }

        .category-btn.delete {
            background: #ff6b6b;
            color: white;
        }

        .category-btn.delete:hover {
            background: #ee5a5a;
        }

        .category-btn.disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .import-export-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .ie-toggle {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }

        .ie-toggle:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.25);
            opacity: 1;
        }

        .ie-toggle:active {
            transform: scale(0.98);
        }

        .ie-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 180px;
            overflow: hidden;
        }

        .ie-menu.active {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ie-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ie-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            color: #667eea;
            transform: translateX(5px);
        }

        .ie-btn:active {
            transform: translateX(5px) scale(0.98);
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 书签导航</h1>
            <p>快速访问您喜爱的网站</p>
        </header>

        <div class="search-bar">
            <form id="searchForm" class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索书签或使用搜索引擎..." onkeyup="handleSearch(event)">
                <div class="search-engine-selector" onclick="toggleSearchEngineDropdown()">
                    <span class="search-engine-icon" id="currentEngineIcon">🔍</span>
                    <span class="search-engine-name" id="currentEngineName"></span>
                </div>
                <div class="search-dropdown" id="searchEngineDropdown">
                    <div class="search-dropdown-item selected" data-engine="bookmarks" onclick="selectSearchEngine('bookmarks')">
                        <span class="engine-icon">⭐</span>
                        <div class="engine-info">
                            <div class="name">书签搜索</div>
                            <div class="url">搜索您的书签</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="google" onclick="selectSearchEngine('google')">
                        <span class="engine-icon">🔍</span>
                        <div class="engine-info">
                            <div class="name">Google</div>
                            <div class="url">google.com</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="baidu" onclick="selectSearchEngine('baidu')">
                        <span class="engine-icon">🅱️</span>
                        <div class="engine-info">
                            <div class="name">百度</div>
                            <div class="url">baidu.com</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="bing" onclick="selectSearchEngine('bing')">
                        <span class="engine-icon">🔷</span>
                        <div class="engine-info">
                            <div class="name">必应</div>
                            <div class="url">bing.com</div>
                        </div>
                    </div>
                    <div class="search-dropdown-item" data-engine="duckduckgo" onclick="selectSearchEngine('duckduckgo')">
                        <span class="engine-icon">🦆</span>
                        <div class="engine-info">
                            <div class="name">DuckDuckGo</div>
                            <div class="url">duckduckgo.com</div>
                        </div>
                    </div>
                </div>
                <div class="search-results" id="searchResults"></div>
            </form>
            <button class="add-btn" onclick="openAddModal()">+ 添加书签</button>
            <button class="add-btn" onclick="openCategoryModal()">📁 编辑分类</button>
        </div>

        <div class="category-filter" id="categoryFilter">
        </div>

        <div id="bookmarkContent">
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h2 id="modalTitle">添加书签</h2>
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="nameInput">网站名称</label>
                    <input type="text" id="nameInput" placeholder="输入网站名称" oninput="setFormDirty()">
                </div>
                <div class="form-group">
                    <label for="urlInput">网站地址</label>
                    <input type="text" id="urlInput" placeholder="输入网站URL或IP地址（可省略http://）" oninput="setFormDirty()">
                </div>
                <div class="form-group">
                    <label for="descriptionInput">描述（可选）</label>
                    <textarea id="descriptionInput" placeholder="输入网站描述或备注信息" oninput="setFormDirty()"></textarea>
                </div>
                <div class="form-group">
                    <label for="categoryInput">分类</label>
                    <select id="categoryInput" onchange="handleCategoryChange(); setFormDirty()">
                        <option value="常用">常用</option>
                        <option value="开发工具">开发工具</option>
                        <option value="搜索引擎">搜索引擎</option>
                        <option value="学习资源">学习资源</option>
                        <option value="社区论坛">社区论坛</option>
                        <option value="其他">其他</option>
                        <option value="__new__">+ 添加新分类</option>
                    </select>
                </div>
                <div class="form-group" id="newCategoryGroup" style="display: none;">
                    <label for="newCategoryInput">新分类名称</label>
                    <input type="text" id="newCategoryInput" placeholder="输入新分类名称" oninput="setFormDirty()">
                </div>
                <div class="btn-group">
                    <button class="cancel-btn" onclick="closeModal()">取消</button>
                    <button class="save-btn" onclick="saveBookmark()">保存</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="categoryModalOverlay">
            <div class="modal">
                <h2>📁 编辑分类</h2>
                <div class="form-group">
                    <label for="newCatName">添加新分类</label>
                    <input type="text" id="newCatName" placeholder="输入新分类名称" onkeyup="handleAddCategoryKeyup(event)">
                </div>
                <button class="add-category-btn" onclick="addCategory()">
                    <span class="add-icon">+</span>
                    <span>添加分类</span>
                </button>
                <div style="margin-bottom: 15px; font-size: 0.8rem; color: #999;">
                    💡 拖动分类可以调整顺序
                </div>
                <div id="categoryList" class="category-list">
                </div>
                <div class="btn-group">
                    <button class="cancel-btn" onclick="closeCategoryModal()">关闭</button>
                </div>
            </div>
        </div>

        <div class="import-export-panel" id="importExportPanel" style="display: none;">
            <button class="ie-toggle" onclick="toggleImportExport()">📥</button>
            <div class="ie-menu" id="ieMenu">
                <button class="ie-btn" onclick="exportBookmarks()">📤 导出书签</button>
                <button class="ie-btn" onclick="triggerImport()">📥 导入书签</button>
            </div>
        </div>

        <input type="file" id="importFile" style="display: none;" accept=".json" onchange="handleImportFile()">

    </div>

    <script>
        const STORAGE_KEY = 'bookmarks';
        const JSON_FILE = 'bookmarks.json';
        
        const CONFIG = {
            enableImportExport: true
        };

        const defaultBookmarks = [
            { id: 1, name: '我的微博', url: 'https://weibo.com', icon: '📱', category: '常用' },
            { id: 2, name: '我的GitHub', url: 'https://github.com', icon: '👨‍💻', category: '常用' },
            { id: 3, name: 'Google', url: 'https://www.google.com', icon: '🔍', category: '搜索引擎' },
            { id: 4, name: 'GitHub', url: 'https://github.com', icon: '💻', category: '开发工具' },
            { id: 5, name: 'Stack Overflow', url: 'https://stackoverflow.com', icon: '❓', category: '社区论坛' },
            { id: 6, name: 'MDN Web Docs', url: 'https://developer.mozilla.org', icon: '📖', category: '学习资源' },
            { id: 7, name: 'Vue.js', url: 'https://vuejs.org', icon: '💚', category: '开发工具' },
            { id: 8, name: 'React', url: 'https://react.dev', icon: '⚛️', category: '开发工具' },
            { id: 9, name: 'TypeScript', url: 'https://www.typescriptlang.org', icon: '📘', category: '开发工具' },
            { id: 10, name: '掘金', url: 'https://juejin.cn', icon: '⛏️', category: '社区论坛' },
            { id: 11, name: 'SegmentFault', url: 'https://segmentfault.com', icon: '💡', category: '社区论坛' },
            { id: 12, name: 'CSDN', url: 'https://www.csdn.net', icon: '📝', category: '社区论坛' },
            { id: 13, name: 'LeetCode', url: 'https://leetcode.cn', icon: '🧮', category: '学习资源' },
            { id: 14, name: '百度', url: 'https://www.baidu.com', icon: '🅱️', category: '搜索引擎' },
            { id: 15, name: 'npm', url: 'https://www.npmjs.com', icon: '📦', category: '开发工具' },
            { id: 16, name: 'Docker', url: 'https://www.docker.com', icon: '🐳', category: '开发工具' }
        ];

       let defaultCategories = ['常用', '开发工具', '搜索引擎', '学习资源', '社区论坛', '其他'];

        async function loadCategoryOrder() {
            try {
                const response = await fetch('/api/categories');
                if (response.ok) {
                    const data = await response.json();
                    defaultCategories = data;
                    localStorage.setItem('categoryOrder', JSON.stringify(data));
                }
            } catch {
                    const saved = localStorage.getItem('categoryOrder');
                    if (saved) {
                        try {
                            defaultCategories = JSON.parse(saved);
                        } catch {
                            defaultCategories = ['常用', '开发工具', '搜索引擎', '学习资源', '社区论坛', '其他'];
                        }
                    }
                }
        }

        let bookmarks = [];
        let currentCategory = '常用';
        let draggedItem = null;
        let currentSearchEngine = 'bookmarks';

        const searchEngines = {
            bookmarks: { name: '书签', icon: '⭐', url: '' },
            google: { name: 'Google', icon: '🔍', url: 'https://www.google.com/search?q=' },
            baidu: { name: '百度', icon: '🔍', url: 'https://www.baidu.com/s?wd=' },
            bing: { name: '必应', icon: '🅱️', url: 'https://www.bing.com/search?q=' },
            duckduckgo: { name: 'DuckDuckGo', icon: '🦆', url: 'https://duckduckgo.com/?q=' }
        };

        function toggleSearchEngineDropdown() {
            const dropdown = document.getElementById('searchEngineDropdown');
            dropdown.classList.toggle('active');
        }

        function selectSearchEngine(engine) {
            currentSearchEngine = engine;
            const engineInfo = searchEngines[engine];
            document.getElementById('currentEngineIcon').textContent = engineInfo.icon;
            document.getElementById('currentEngineName').textContent = engineInfo.name;
            document.querySelectorAll('.search-dropdown-item').forEach(item => {
                item.classList.remove('selected');
            });
            document.querySelector(`[data-engine="${engine}"]`).classList.add('selected');
            document.getElementById('searchEngineDropdown').classList.remove('active');
            const input = document.getElementById('searchInput');
            if (input.value.trim()) {
                performSearch(input.value.trim());
            }
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                performEnterSearch();
            } else {
                const query = event.target.value.trim();
                if (query && currentSearchEngine === 'bookmarks') {
                    performSearch(query);
                } else {
                    document.getElementById('searchResults').innerHTML = '';
                }
            }
        }

        function performEnterSearch() {
            const input = document.getElementById('searchInput');
            const query = input.value.trim();
            if (query) {
                if (currentSearchEngine === 'bookmarks') {
                    const results = searchBookmarks(query);
                    if (results.length > 0) {
                        openBookmark(results[0].url);
                    }
                } else {
                    const url = searchEngines[currentSearchEngine].url + encodeURIComponent(query);
                    window.open(url, '_blank');
                }
                document.getElementById('searchResults').innerHTML = '';
                input.value = '';
            }
        }

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            performEnterSearch();
        });

        function performSearch(query) {
            const results = searchBookmarks(query);
            const resultsContainer = document.getElementById('searchResults');
            
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="search-no-results">
                        未找到匹配的书签
                    </div>
                    <div class="search-suggestions">
                        <div class="suggestion-title">在搜索引擎中搜索</div>
                        <div class="suggestion-item" onclick="searchWithEngine('bing', '${query}')">
                            <span class="search-icon">🅱️</span>
                            <span class="text">必应搜索 "${query}"</span>
                        </div>
                        <div class="suggestion-item" onclick="searchWithEngine('baidu', '${query}')">
                            <span class="search-icon">🔍</span>
                            <span class="text">百度搜索 "${query}"</span>
                        </div>
                    </div>
                `;
            } else {
                resultsContainer.innerHTML = results.map(bookmark => `
                    <div class="search-result-item" onclick="openBookmark('${bookmark.url}'); document.getElementById('searchResults').innerHTML = ''; document.getElementById('searchInput').value = '';">
                        <div class="icon">${bookmark.icon}</div>
                        <div class="info">
                            <div class="name">${bookmark.name}</div>
                            <div class="url">${truncateUrl(bookmark.url)}</div>
                        </div>
                        <span class="category">${bookmark.category}</span>
                    </div>
                `).join('');
            }
        }

        function searchBookmarks(query) {
            const lowerQuery = query.toLowerCase();
            return bookmarks.filter(bookmark => 
                bookmark.name.toLowerCase().includes(lowerQuery) ||
                bookmark.url.toLowerCase().includes(lowerQuery) ||
                bookmark.description && bookmark.description.toLowerCase().includes(lowerQuery) ||
                bookmark.category.toLowerCase().includes(lowerQuery)
            );
        }

        function searchWithEngine(engine, query) {
            const url = searchEngines[engine].url + encodeURIComponent(query);
            window.open(url, '_blank');
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchInput').value = '';
        }

        document.addEventListener('click', (e) => {
            const searchContainer = document.querySelector('.search-container');
            const dropdown = document.getElementById('searchEngineDropdown');
            const results = document.getElementById('searchResults');
            
            if (!searchContainer.contains(e.target)) {
                if (dropdown.classList.contains('active')) {
                    dropdown.classList.remove('active');
                }
                if (results.innerHTML) {
                    results.innerHTML = '';
                    document.getElementById('searchInput').value = '';
                }
            }
        });

        function handleCategoryChange() {
            const select = document.getElementById('categoryInput');
            const newCategoryGroup = document.getElementById('newCategoryGroup');
            if (select.value === '__new__') {
                newCategoryGroup.style.display = 'block';
            } else {
                newCategoryGroup.style.display = 'none';
            }
        }

        function updateCategories() {
            const allCategories = [...new Set(bookmarks.map(b => b.category))];
            
            const defaultCats = defaultCategories.filter(cat => cat !== '其他');
            
            const sortedCategories = [...defaultCats];
            
            const customCategories = allCategories.filter(cat => !defaultCats.includes(cat) && cat !== '其他');
            customCategories.sort();
            sortedCategories.push(...customCategories);
            
            if (allCategories.includes('其他') || !sortedCategories.includes('其他')) {
                sortedCategories.push('其他');
            }
            
            categories = ['全部', ...sortedCategories];
            renderCategories();
            updateCategorySelect();
        }

        function updateCategorySelect() {
            const select = document.getElementById('categoryInput');
            const currentValue = select.value;
            select.innerHTML = categories
                .filter(c => c !== '全部')
                .map(c => `<option value="${c}">${c}</option>`)
                .join('') + '<option value="__new__">+ 添加新分类</option>';
            if (categories.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        async function init() {
            await loadCategoryOrder();
            await loadBookmarks();
            updateCategories();
            renderBookmarks();
            setupCategoryScroll();
            
            if (CONFIG.enableImportExport) {
                document.getElementById('importExportPanel').style.display = 'block';
            }
        }

        async function loadBookmarks() {
            try {
                const response = await fetch('/api/bookmarks');
                if (response.ok) {
                    const data = await response.json();
                    bookmarks = data.map((item, index) => ({
                        ...item,
                        order: item.order !== undefined ? item.order : index
                    }));
                    bookmarks.sort((a, b) => a.order - b.order);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
                } else {
                    loadFromLocalStorage();
                }
            } catch {
                loadFromLocalStorage();
            }
        }

        function loadFromLocalStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                bookmarks = JSON.parse(stored);
            } else {
                bookmarks = defaultBookmarks.map((item, index) => ({
                    ...item,
                    order: index
                }));
            }
        }

        async function saveBookmarks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
            try {
                await fetch('/api/bookmarks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookmarks)
                });
            } catch (e) {
                console.log('保存到服务器失败，已保存到本地存储');
            }
        }

        function exportBookmarks() {
            const blob = new Blob([JSON.stringify(bookmarks, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = JSON_FILE;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            document.getElementById('ieMenu').classList.remove('active');
        }

        function toggleImportExport() {
            const menu = document.getElementById('ieMenu');
            menu.classList.toggle('active');
        }

        function triggerImport() {
            document.getElementById('importFile').click();
            document.getElementById('ieMenu').classList.remove('active');
        }

        function handleImportFile() {
            const fileInput = document.getElementById('importFile');
            if (!fileInput.files || fileInput.files.length === 0) {
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (!Array.isArray(importedData)) {
                        alert('无效的书签数据格式');
                        return;
                    }

                    if (importedData.length === 0) {
                        alert('导入的书签数据为空');
                        return;
                    }

                    const importMode = prompt(`检测到 ${importedData.length} 个书签，选择导入方式：\n1 - 追加到现有书签\n2 - 替换所有书签`);
                    
                    if (importMode !== '1' && importMode !== '2') {
                        alert('取消导入');
                        return;
                    }

                    let maxId = Math.max(...bookmarks.map(b => b.id), 0);

                    if (importMode === '2') {
                        bookmarks = [];
                        maxId = 0;
                    }
                    
                    const existingCategories = [...new Set(bookmarks.map(b => b.category))];
                    const newCategories = new Set();
                    
                    importedData.forEach((item, index) => {
                        const bookmarkCategory = item.category || '其他';
                        if (!existingCategories.includes(bookmarkCategory) && !bookmarks.some(b => b.category === bookmarkCategory)) {
                            newCategories.add(bookmarkCategory);
                        }
                        const newBookmark = {
                            id: ++maxId,
                            name: item.name || '未命名',
                            url: item.url || '',
                            icon: item.icon || '🔗',
                            category: bookmarkCategory,
                            order: bookmarks.length + index,
                            description: item.description || ''
                        };
                        bookmarks.push(newBookmark);
                    });

                    saveBookmarks();
                    updateCategories();
                    renderBookmarks();
                    
                    let message = `成功导入 ${importedData.length} 个书签！`;
                    if (newCategories.size > 0) {
                        message += `\n\n新增分类：${[...newCategories].join('、')}`;
                    }
                    alert(message);
                    
                } catch (error) {
                    alert('导入失败：无效的JSON文件');
                }
            };

            reader.readAsText(file);
            fileInput.value = '';
        }

        document.addEventListener('click', (e) => {
            const panel = document.getElementById('importExportPanel');
            if (panel && !panel.contains(e.target)) {
                document.getElementById('ieMenu').classList.remove('active');
            }
        });

        function renderCategories() {
            const filter = document.getElementById('categoryFilter');
            filter.innerHTML = categories.map(cat => `
                <button class="category-tag ${cat === currentCategory ? 'active' : ''}" 
                        onclick="filterByCategory('${cat}')">${cat}</button>
            `).join('');
        }

        function setupCategoryScroll() {
            const filter = document.getElementById('categoryFilter');
            const bookmarkContent = document.getElementById('bookmarkContent');
            let isHoveringFilter = false;
            let isHoveringBookmarks = false;
            
            filter.addEventListener('mouseenter', function() {
                isHoveringFilter = true;
            });
            
            filter.addEventListener('mouseleave', function() {
                isHoveringFilter = false;
            });
            
            bookmarkContent.addEventListener('mouseenter', function() {
                isHoveringBookmarks = true;
            });
            
            bookmarkContent.addEventListener('mouseleave', function() {
                isHoveringBookmarks = false;
            });
            
            function handleWheel(e) {
                if (!isHoveringFilter && !isHoveringBookmarks) {
                    return;
                }
                
                if (currentCategory === '全部') {
                    return;
                }
                
                e.preventDefault();
                
                const nonAllCategories = categories.filter(c => c !== '全部');
                let currentIndex = nonAllCategories.indexOf(currentCategory);
                
                if (currentIndex === -1) {
                    currentIndex = 0;
                }
                
                if (e.deltaX > 0 || e.deltaY > 0) {
                    currentIndex = (currentIndex + 1) % nonAllCategories.length;
                } else if (e.deltaX < 0 || e.deltaY < 0) {
                    currentIndex = (currentIndex - 1 + nonAllCategories.length) % nonAllCategories.length;
                }
                
                filterByCategory(nonAllCategories[currentIndex]);
            }
            
            filter.addEventListener('wheel', handleWheel);
            bookmarkContent.addEventListener('wheel', handleWheel);
        }

        function filterByCategory(category) {
            currentCategory = category;
            renderCategories();
            renderBookmarks();
        }

        function getBookmarksByCategory() {
            if (currentCategory === '全部') {
                return bookmarks;
            }
            return bookmarks.filter(b => b.category === currentCategory);
        }

        function groupBookmarksByCategory() {
            const filtered = getBookmarksByCategory();
            if (currentCategory !== '全部') {
                return { [currentCategory]: filtered };
            }
            return filtered.reduce((groups, bookmark) => {
                if (!groups[bookmark.category]) {
                    groups[bookmark.category] = [];
                }
                groups[bookmark.category].push(bookmark);
                return groups;
            }, {});
        }

        function renderBookmarks() {
            const content = document.getElementById('bookmarkContent');

            if (bookmarks.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h3>暂无书签</h3>
                        <p>点击上方按钮添加您的第一个书签</p>
                    </div>
                `;
                return;
            }

            const grouped = bookmarks.reduce((groups, bookmark) => {
                if (!groups[bookmark.category]) {
                    groups[bookmark.category] = [];
                }
                groups[bookmark.category].push(bookmark);
                return groups;
            }, {});

            let displayCategories;
            if (currentCategory === '全部') {
                const defaultCats = defaultCategories.filter(cat => cat !== '其他' && Object.keys(grouped).includes(cat));
                displayCategories = Object.keys(grouped).sort((a, b) => {
                    // "其他"始终放在最后
                    if (a === '其他') return 1;
                    if (b === '其他') return -1;
                    const indexA = defaultCats.indexOf(a);
                    const indexB = defaultCats.indexOf(b);
                    if (indexA !== -1 && indexB !== -1) {
                        return indexA - indexB;
                    }
                    if (indexA !== -1) return -1;
                    if (indexB !== -1) return 1;
                    return a.localeCompare(b);
                });
            } else {
                displayCategories = [currentCategory];
            }

            content.innerHTML = displayCategories.map(category => {
                const items = grouped[category] || [];
                return `
                    <div class="bookmark-section">
                        <div class="section-header">
                            <h2>${category}</h2>
                            <span class="count">${items.length}</span>
                        </div>
                        <div class="bookmark-grid">
                            ${items.length > 0 ? items.map(bookmark => `
                                <div class="bookmark-card" 
                                     draggable="true"
                                     data-id="${bookmark.id}"
                                     ondragstart="handleDragStart(event)"
                                     ondragend="handleDragEnd(event)"
                                     ondragover="handleDragOver(event)"
                                     ondrop="handleDrop(event)"
                                     onclick="openBookmark('${bookmark.url}')">
                                    <div class="icon">${bookmark.icon}</div>
                                    <h3>${bookmark.name}</h3>
                                    <p>${truncateUrl(bookmark.url)}</p>
                                    ${bookmark.description ? `<p class="description">${bookmark.description}</p>` : ''}
                                    <span class="category-badge">${bookmark.category}</span>
                                    <div class="actions">
                                        <button class="edit-btn" onclick="event.stopPropagation(); openEditModal(${bookmark.id})">编辑</button>
                                        <button class="delete-btn" onclick="event.stopPropagation(); deleteBookmark(${bookmark.id})">删除</button>
                                    </div>
                                </div>
                            `).join('') : `
                                <div class="bookmark-card add-card" onclick="openAddModalWithCategory('${category}')">
                                    <div class="add-icon">+</div>
                                    <h3>添加书签</h3>
                                    <p>点击添加新书签</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleDragStart(event) {
            draggedItem = event.target;
            draggedItem.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedItem.dataset.id);
        }

        function handleDragEnd(event) {
            draggedItem.classList.remove('dragging');
            document.querySelectorAll('.bookmark-card').forEach(card => {
                card.classList.remove('drag-over');
            });
            draggedItem = null;
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const cards = document.querySelectorAll('.bookmark-card');
            cards.forEach(card => {
                if (card !== draggedItem) {
                    card.classList.remove('drag-over');
                }
            });
            event.target.closest('.bookmark-card')?.classList.add('drag-over');
        }

        function handleDrop(event) {
            event.preventDefault();
            const draggedId = parseInt(event.dataTransfer.getData('text/plain'));
            const dropTarget = event.target.closest('.bookmark-card');
            
            if (!dropTarget || draggedId === parseInt(dropTarget.dataset.id)) {
                return;
            }

            const dropId = parseInt(dropTarget.dataset.id);
            const draggedIndex = bookmarks.findIndex(b => b.id === draggedId);
            const dropIndex = bookmarks.findIndex(b => b.id === dropId);

            if (draggedIndex !== -1 && dropIndex !== -1) {
                const [draggedItemData] = bookmarks.splice(draggedIndex, 1);
                bookmarks.splice(dropIndex, 0, draggedItemData);
                
                bookmarks.forEach((bookmark, index) => {
                    bookmark.order = index;
                });

                saveBookmarks();
                renderBookmarks();
            }
        }

        function truncateUrl(url) {
            const maxLength = 20;
            if (url.length <= maxLength) return url;
            return url.substring(0, maxLength) + '...';
        }

        function openBookmark(url) {
            window.open(url, '_blank');
        }

        function openAddModal() {
            clearFormDirtyFlag();
            document.getElementById('modalTitle').textContent = '添加书签';
            document.getElementById('editId').value = '';
            document.getElementById('nameInput').value = '';
            document.getElementById('urlInput').value = '';
            document.getElementById('descriptionInput').value = '';
            const defaultCategory = currentCategory === '全部' ? '管理地址' : currentCategory;
            document.getElementById('categoryInput').value = defaultCategory;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function openAddModalWithCategory(category) {
            clearFormDirtyFlag();
            document.getElementById('modalTitle').textContent = '添加书签';
            document.getElementById('editId').value = '';
            document.getElementById('nameInput').value = '';
            document.getElementById('urlInput').value = '';
            document.getElementById('descriptionInput').value = '';
            document.getElementById('categoryInput').value = category;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function openEditModal(id) {
            clearFormDirtyFlag();
            const bookmark = bookmarks.find(b => b.id === id);
            if (bookmark) {
                document.getElementById('modalTitle').textContent = '编辑书签';
                document.getElementById('editId').value = id;
                document.getElementById('nameInput').value = bookmark.name;
                document.getElementById('urlInput').value = bookmark.url;
                document.getElementById('descriptionInput').value = bookmark.description || '';
                document.getElementById('categoryInput').value = bookmark.category;
                document.getElementById('modalOverlay').classList.add('active');
            }
        }

        function closeModal(force = false) {
            if (!force && hasUnsavedChanges()) {
                if (!confirm('您有未保存的更改，确定要退出吗？')) {
                    return;
                }
            }
            document.getElementById('modalOverlay').classList.remove('active');
            clearFormDirtyFlag();
        }

        let formDirty = false;

        function setFormDirty() {
            formDirty = true;
        }

        function clearFormDirtyFlag() {
            formDirty = false;
        }

        function hasUnsavedChanges() {
            return formDirty;
        }

        function saveBookmark() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('nameInput').value.trim();
            let url = document.getElementById('urlInput').value.trim();
            const description = document.getElementById('descriptionInput').value.trim();
            let category = document.getElementById('categoryInput').value;

            if (!name || !url) {
                alert('请填写完整信息');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'http://' + url;
            }

            if (category === '__new__') {
                const newCategory = document.getElementById('newCategoryInput').value.trim();
                if (!newCategory) {
                    alert('请输入新分类名称');
                    return;
                }
                category = newCategory;
            }

            const icons = ['🌟', '⭐', '🔥', '💎', '🎯', '🎨', '🚀', '💡', '🎯', '⚡', '🌈', '🎪', '🎭', '🎬', '🎨'];
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];

            if (id) {
                bookmarks = bookmarks.map(b => 
                    b.id === parseInt(id) 
                        ? { ...b, name, url, description, category }
                        : b
                );
            } else {
                const newId = bookmarks.length > 0 ? Math.max(...bookmarks.map(b => b.id)) + 1 : 1;
                bookmarks.push({ 
                    id: newId, 
                    name, 
                    url, 
                    icon: randomIcon, 
                    category,
                    order: bookmarks.length 
                });
            }

            saveBookmarks();
            updateCategories();
            renderBookmarks();
            closeModal(true);
        }

        function deleteBookmark(id) {
            if (confirm('确定要删除这个书签吗？')) {
                bookmarks = bookmarks.filter(b => b.id !== id);
                bookmarks.forEach((bookmark, index) => {
                    bookmark.order = index;
                });
                saveBookmarks();
                renderBookmarks();
            }
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        document.getElementById('categoryModalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('categoryModalOverlay')) {
                closeCategoryModal();
            }
        });

        function openCategoryModal() {
            document.getElementById('categoryModalOverlay').classList.add('active');
            renderCategoryList();
        }

        function closeCategoryModal() {
            document.getElementById('categoryModalOverlay').classList.remove('active');
            document.getElementById('newCatName').value = '';
        }

        let draggedCategory = null;

        function renderCategoryList() {
            const allCategories = [...new Set(bookmarks.map(b => b.category))];
            const sortedCategories = [];
            
            // 排除"其他"后再添加默认分类
            const defaultCats = defaultCategories.filter(cat => cat !== '其他');
            
            // 默认分类始终显示，无论是否有书签
            sortedCategories.push(...defaultCats);
            
            const customCategories = allCategories.filter(cat => !defaultCats.includes(cat) && cat !== '其他');
            customCategories.sort();
            sortedCategories.push(...customCategories);
            
            // "其他"始终放在最后
            if (!sortedCategories.includes('其他')) {
                sortedCategories.push('其他');
            }

            const list = document.getElementById('categoryList');
            list.innerHTML = sortedCategories.map(cat => {
                const count = bookmarks.filter(b => b.category === cat).length;
                const isDefault = defaultCats.includes(cat);
                return `
                    <div class="category-item" 
                         draggable="true"
                         data-category="${cat}"
                         ondragstart="handleCategoryDragStart(event)"
                         ondragend="handleCategoryDragEnd(event)"
                         ondragover="handleCategoryDragOver(event)"
                         ondrop="handleCategoryDrop(event)">
                        <div>
                            <span class="category-name">📁 ${cat}</span>
                            <span class="category-count">(${count}个书签)</span>
                        </div>
                        <div class="category-actions">
                            <button class="category-btn rename" onclick="event.stopPropagation(); renameCategory('${cat}')">重命名</button>
                            ${!isDefault ? `<button class="category-btn delete" onclick="event.stopPropagation(); deleteCategory('${cat}')">删除</button>` : '<button class="category-btn disabled" disabled>默认</button>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleCategoryDragStart(event) {
            draggedCategory = event.target;
            draggedCategory.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedCategory.dataset.category);
        }

        function handleCategoryDragEnd(event) {
            draggedCategory.classList.remove('dragging');
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('drag-over');
            });
            draggedCategory = null;
        }

        function handleCategoryDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const items = document.querySelectorAll('.category-item');
            items.forEach(item => {
                if (item !== draggedCategory) {
                    item.classList.remove('drag-over');
                }
            });
            event.target.closest('.category-item')?.classList.add('drag-over');
        }

        async function handleCategoryDrop(event) {
            event.preventDefault();
            const draggedCat = event.dataTransfer.getData('text/plain');
            const dropTarget = event.target.closest('.category-item');
            
            if (!dropTarget || draggedCat === dropTarget.dataset.category) {
                return;
            }

            const dropCat = dropTarget.dataset.category;
            
            const allCategories = [...new Set(bookmarks.map(b => b.category))];
            
            // 排除"其他"后再处理默认分类
            const defaultCats = defaultCategories.filter(cat => cat !== '其他');
            const sortedCategories = [];
            
            defaultCats.forEach(cat => {
                if (allCategories.includes(cat)) {
                    sortedCategories.push(cat);
                }
            });
            
            const customCategories = allCategories.filter(cat => !defaultCats.includes(cat) && cat !== '其他');
            customCategories.sort();
            sortedCategories.push(...customCategories);
            
            // "其他"始终放在最后
            if (allCategories.includes('其他')) {
                sortedCategories.push('其他');
            }

            const draggedIndex = sortedCategories.indexOf(draggedCat);
            const dropIndex = sortedCategories.indexOf(dropCat);

            if (draggedIndex !== -1 && dropIndex !== -1) {
                const newCategories = [...sortedCategories];
                newCategories.splice(draggedIndex, 1);
                newCategories.splice(dropIndex, 0, draggedCat);
                
                // 分离默认分类和自定义分类，"其他"归入默认分类
                const newDefaultCategories = newCategories.filter(cat => defaultCats.includes(cat) || cat === '其他');
                const newCustomCategories = newCategories.filter(cat => !newDefaultCategories.includes(cat) && cat !== '其他');
                
                localStorage.setItem('categoryOrder', JSON.stringify(newCategories));
                defaultCategories.length = 0;
                defaultCategories.push(...newDefaultCategories);
                
                try {
                    await fetch('/api/categories', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newCategories)
                    });
                } catch (e) {
                    console.log('保存分类顺序到服务器失败');
                }
                
                updateCategories();
                renderBookmarks();
                renderCategoryList();
            }
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            if (!name) {
                alert('请输入分类名称');
                return;
            }
            if (bookmarks.some(b => b.category === name)) {
                alert('该分类已存在');
                return;
            }
            bookmarks.push({ 
                id: bookmarks.length > 0 ? Math.max(...bookmarks.map(b => b.id)) + 1 : 1,
                name: name,
                url: '#',
                icon: '📁',
                category: name,
                order: bookmarks.length
            });
            saveBookmarks();
            updateCategories();
            document.getElementById('newCatName').value = '';
            renderCategoryList();
        }

        function handleAddCategoryKeyup(event) {
            if (event.key === 'Enter') {
                addCategory();
            }
        }

        function renameCategory(oldName) {
            const newName = prompt('请输入新的分类名称:', oldName);
            if (!newName || newName.trim() === '') return;
            if (bookmarks.some(b => b.category === newName.trim())) {
                alert('该分类已存在');
                return;
            }
            bookmarks = bookmarks.map(b => 
                b.category === oldName ? { ...b, category: newName.trim() } : b
            );
            // 更新 defaultCategories 数组中的分类名称
            const index = defaultCategories.indexOf(oldName);
            if (index !== -1) {
                defaultCategories[index] = newName.trim();
            }
            saveBookmarks();
            updateCategories();
            renderCategoryList();
            renderBookmarks();
        }

        async function deleteCategory(name) {
            if (confirm(`确定要删除分类 "${name}" 吗？该分类下的所有书签将被移到"其他"分类。`)) {
                bookmarks = bookmarks.map(b => 
                    b.category === name ? { ...b, category: '其他' } : b
                );
                const index = defaultCategories.indexOf(name);
                if (index !== -1) {
                    defaultCategories.splice(index, 1);
                }
                localStorage.setItem('categoryOrder', JSON.stringify(defaultCategories));
                try {
                    await fetch('/api/categories', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(defaultCategories)
                    });
                } catch (e) {
                    console.log('保存分类顺序到服务器失败');
                }
                saveBookmarks();
                updateCategories();
                renderCategoryList();
                renderBookmarks();
            }
        }

        function loadBackgroundImage() {
            const img = new Image();
            img.onload = function() {
                document.body.classList.add('loaded');
            };
            img.onerror = function() {
                console.log('背景图加载失败，使用渐变背景');
            };
            img.src = '/bg.JPG';
        }

        document.addEventListener('DOMContentLoaded', function() {
            init();
            setTimeout(loadBackgroundImage, 500);
        });
    </script>
</body>
</html>
